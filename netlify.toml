[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[dev]
  command = "npm run dev"
  port = 8888

# Proxy API requests through Netlify function to avoid CORS issues
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/proxy:splat"
  status = 200

# Redirect all unmatched routes to index.html for SPA routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Handle environment variables
[env.production]
  VITE_API_BASE_URL = "https://admin-moderator-backend-staging.up.railway.app/api"
