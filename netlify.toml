[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# Proxy all /api/* requests through our proxy function
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/proxy/:splat"
  status = 200

# Redirect all other routes to index.html for SPA
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
